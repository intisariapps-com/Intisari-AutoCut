<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intisari AutoCut - Downloader</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .hub-container {
            display: block; 
            padding: 20px; 
            max-width: 600px; 
            margin: 0 auto;
            width: 100%;
        }
        .back-btn {
            display: inline-block;
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 8px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .back-btn:hover {
            background: rgba(6, 182, 212, 0.2);
            border-color: var(--accent-cyan);
        }
    </style>
</head>
<body style="display: block;">
    <div class="hub-container">
        <a href="/" class="back-btn">⬅️ Kembali ke Menu</a>

        <main class="content" style="border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); background-color: var(--bg-card);">
            <header class="topbar" style="border-bottom: 1px solid var(--border-color);">
                <h1 style="margin:0;">Smart Universal Downloader <span style="font-size: 0.8rem; color: var(--accent-cyan);">v1.3.1 (Visual Status)</span></h1>
                <div class="user-info"><span class="badge online">ONLINE</span></div>
            </header>

            <section class="dashboard-cards" style="grid-template-columns: 1fr; padding: 20px;">
                <div class="card" style="border: none; box-shadow: none; padding: 0;">
                    <p style="color: var(--text-muted); margin-bottom: 20px;">Masukkan tautan video dan pilih platform yang sesuai.</p>
                    
                    <div id="statusIndicator" style="display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 10px; background: rgba(255,255,255,0.03);">
                        <div id="statusDot" style="width: 12px; height: 12px; border-radius: 50%; background: var(--text-muted); transition: all 0.5s ease;"></div>
                        <span id="statusText" style="font-weight: bold; font-size: 0.85rem; color: var(--text-muted); letter-spacing: 1px;">SYSTEM IDLE</span>
                    </div>
                    
                    <div class="input-group">
                        <label for="videoUrl">🔗 Masukkan URL Video (Otomatis Deteksi Platform):</label>
                        <input type="text" id="videoUrl" placeholder="Contoh: https://youtu.be/... atau https://vt.tiktok.com/..." style="font-size: 1.1rem; padding: 15px; border-radius: 8px;">
                        <small style="color: var(--accent-cyan); display: block; margin-top: 8px; font-weight: bold;">Sistem akan mendeteksi YouTube, TikTok, Instagram, atau Facebook secara otomatis.</small>
                    </div>

                    <button class="btn-primary" onclick="mulaiUnduh()">Mulai Eksekusi Engine</button>
                </div>

                <div class="card terminal-hint">
                    <h3>Terminal Log (Real-time)</h3>
                    <div class="terminal-window" id="terminalLog">
                        > Sistem Downloader v1.1.0 siap...<br>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/downloader.js"></script>
</body>
</html>
