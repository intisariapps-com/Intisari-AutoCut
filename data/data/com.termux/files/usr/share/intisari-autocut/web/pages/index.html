<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intisari AutoCut - Main Menu</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* CSS Khusus untuk Layout Menu Beranda */
        .hub-container {
            display: block; 
            padding: 20px; 
            max-width: 600px; 
            margin: 0 auto;
            width: 100%;
        }
        .hub-header { text-align: center; margin-bottom: 25px; padding-top: 10px; }
        .hub-header h1 { color: var(--text-main); font-size: 2.2rem; letter-spacing: 2px; }
        .hub-header span { color: var(--accent-gold); }
        
        .hub-stats { 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .hub-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }
        
        .hub-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            padding: 25px 10px; 
            text-align: center; 
            border-radius: 12px; 
            text-decoration: none; 
            color: var(--text-main); 
            transition: all 0.3s ease; 
            display: block; 
        }
        
        .hub-card:hover, .hub-card:active { 
            border-color: var(--accent-cyan); 
            transform: translateY(-5px); 
            background: rgba(6, 182, 212, 0.05); 
        }
        
        .hub-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .hub-card h3 { font-size: 1rem; color: var(--text-muted); }
    </style>
</head>
<body style="display: block;"> <div class="hub-container">
        <div class="hub-header">
            <h1>INTISARI <span>PRO</span></h1>
            <p style="color: var(--text-muted); margin-top: 5px;">
                Command Center v1.2.0 
                <span class="badge online" style="background: rgba(16,185,129,0.2); color: var(--accent-green); padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; border: 1px solid var(--accent-green); vertical-align: middle; margin-left: 5px;">ONLINE</span>
            </p>
        </div>

        <div class="hub-stats">
            <div style="text-align: center; width: 50%;">
                <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 5px;">Pengguna Aktif</p>
                <h3 id="userName" style="color: var(--accent-cyan); font-size: 1.2rem;">Membaca...</h3>
                <small id="memberId" style="color: var(--text-muted); font-weight: bold;">TRIAL/PRO</small>
            </div>
            <div style="text-align: center; width: 50%; border-left: 1px solid rgba(255,255,255,0.1);">
                <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 5px;">Total Global Cut</p>
                <h3 id="totalVideos" style="color: var(--accent-gold); font-size: 1.8rem; margin: 0;">0</h3>
            </div>
        </div>

        <h2 style="font-size: 1.1rem; color: var(--text-muted); margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Menu Modul</h2>
        <div class="hub-grid">
            <a href="/downloader" class="hub-card">
                <div class="hub-icon">⬇️</div>
                <h3>Downloader</h3>
            </a>
            <a href="/processor" class="hub-card">
                <div class="hub-icon">✂️</div>
                <h3>Potong Galeri</h3>
            </a>
            <a href="/settings" class="hub-card">
                <div class="hub-icon">⚙️</div>
                <h3>Pengaturan</h3>
            </a>
            <a href="/system" class="hub-card">
                <div class="hub-icon">🖥️</div>
                <h3>System & Logs</h3>
            </a>
            <a href="/viral" class="hub-card">
                <div class="hub-icon">🌐</div>
                <h3>Viral Engine</h3>
            </a>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
