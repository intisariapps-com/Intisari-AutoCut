<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intisari AutoCut - Pengaturan Global</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .hub-container {
            display: block; 
            padding: 20px; 
            max-width: 600px; 
            margin: 0 auto;
            width: 100%;
        }
        .back-btn {
            display: inline-block;
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 8px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .back-btn:hover {
            background: rgba(6, 182, 212, 0.2);
            border-color: var(--accent-cyan);
        }
        /* Mobile adjustment for grid */
        @media (max-width: 768px) {
            .settings-grid { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body style="display: block;">
    <div class="hub-container">
        <a href="/" class="back-btn">⬅️ Kembali ke Menu</a>

        <main class="content" style="border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); background-color: var(--bg-card);">
            <header class="topbar" style="border-bottom: 1px solid var(--border-color);">
                <h1 style="margin:0;">Pengaturan Global <span style="font-size: 0.8rem; color: var(--text-muted);">v1.2.0</span></h1>
                <div class="user-info"><span class="badge online">ONLINE</span></div>
            </header>

            <section class="dashboard-cards" style="grid-template-columns: 1fr; padding: 20px;">
                <div class="card" style="border: none; box-shadow: none; padding: 0;">
                    <p style="color: var(--text-muted); margin-bottom: 20px;">Atur preferensi default agar aplikasi memproses video secara otomatis tanpa dialog konfirmasi.</p>
                    
                    <div class="settings-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="input-group">
                            <label for="setQuality">Default Kualitas (YouTube):</label>
                            <select id="setQuality">
                                <option value="0">Tanya Setiap Kali</option>
                                <option value="1">Selalu 1080p (FHD)</option>
                                <option value="2">Selalu 720p (HD)</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="setReframe">Default Gaya Reframe:</label>
                            <select id="setReframe">
                                <option value="0">Tanya Setiap Kali</option>
                                <option value="1">Selalu Cinematic (Blur Latar)</option>
                                <option value="2">Selalu Podcast Solo</option>
                                <option value="3">Selalu Podcast Berdua</option>
                                <option value="4">Selalu Original</option>
                            </select>
                        </div>
                    </div>

                    <button class="btn-primary" style="margin-top: 15px;" onclick="simpanPengaturan()">💾 Simpan Pengaturan</button>
                </div>

                <div class="card terminal-hint">
                    <h3>Terminal Log (Real-time)</h3>
                    <div class="terminal-window" id="terminalLog">
                        > Modul Pengaturan v1.1.0 siap...<br>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/settings.js"></script>
</body>
</html>
