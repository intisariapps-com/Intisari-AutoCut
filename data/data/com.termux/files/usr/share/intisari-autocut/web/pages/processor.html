<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intisari AutoCut - Potong Galeri</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .hub-container {
            display: block; 
            padding: 20px; 
            max-width: 600px; 
            margin: 0 auto;
            width: 100%;
        }
        .back-btn {
            display: inline-block;
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 8px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .back-btn:hover {
            background: rgba(6, 182, 212, 0.2);
            border-color: var(--accent-cyan);
        }
        /* CSS List Video */
        .video-list { list-style: none; margin-top: 15px; padding: 0; }
        .video-item {
            background-color: var(--bg-main);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .video-item span { color: var(--text-main); font-family: monospace; font-size: 0.9rem; word-break: break-all; margin-right: 10px; }
        .btn-process {
            background-color: var(--accent-green);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        .btn-process:hover { opacity: 0.8; }
    </style>
</head>
<body style="display: block;">
    <div class="hub-container">
        <a href="/" class="back-btn">⬅️ Kembali ke Menu</a>

        <main class="content" style="border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); background-color: var(--bg-card);">
            <header class="topbar" style="border-bottom: 1px solid var(--border-color);">
                <h1 style="margin:0;">Potong Video Galeri <span style="font-size: 0.8rem; color: var(--text-muted);">v1.2.0</span></h1>
                <div class="user-info"><span class="badge online">ONLINE</span></div>
            </header>

            <section class="dashboard-cards" style="grid-template-columns: 1fr; padding: 20px;">
                <div class="card" style="border: none; box-shadow: none; padding: 0;">
                    <p style="color: var(--text-muted);">Direktori Target: <code>/sdcard/Video To Clip</code></p>
                    
                    <button class="btn-primary" style="margin-top: 15px; width: auto;" onclick="muatDaftarVideo()">🔄 Muat Ulang Daftar Video</button>

                    <ul class="video-list" id="videoContainer">
                        <li class="video-item" style="justify-content: center; color: var(--text-muted);">
                            Klik tombol di atas untuk memuat data...
                        </li>
                    </ul>
                </div>

                <div class="card terminal-hint">
                    <h3>Terminal Log (Real-time)</h3>
                    <div class="terminal-window" id="terminalLog">
                        > Sistem Processor v1.1.0 siap...<br>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/processor.js"></script>
</body>
</html>
